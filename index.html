<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BCF: Zen Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        
        /* The Sliding HUD */
        #controls { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100; 
            background: rgba(0,0,0,0.95); padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid #333;
        }
        #controls.hidden { transform: translateY(-100%); }

        .btn-group { display: flex; gap: 10px; }
        button { background: #f06292; border: none; color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #status { font-size: 11px; color: #ffab91; text-align: center; }

        /* The Comic Strip */
        #strip-container { display: flex; flex-direction: column; width: 100vw; margin: 0; padding: 0; }
        .page { width: 100%; display: block; height: auto; margin: 0; }

        /* Tap zones for interaction */
        #top-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 90; }
    </style>
</head>
<body>

<div id="top-trigger"></div>

<div id="controls">
    <div class="btn-group">
        <button id="accelBtn">1. Enable Tilt</button>
        <button style="background:#444" onclick="document.getElementById('fileInput').click()">2. Open Comic</button>
    </div>
    <input type="file" id="fileInput" accept=".cbz,.zip,image/*" multiple style="display:none">
    <div id="status">Tap top edge to return to menu.</div>
</div>

<div id="strip-container"></div>

<script>
    let speed = 0, sensitivity = 0.5, neutralZone = 45, isActive = false, hudTimer;
    const controls = document.getElementById('controls');
    const container = document.getElementById('strip-container');
    const status = document.getElementById('status');

    function hideHUD() { controls.classList.add('hidden'); }
    function showHUD() { 
        controls.classList.remove('hidden'); 
        clearTimeout(hudTimer);
        hudTimer = setTimeout(hideHUD, 4000); 
    }

    // Show menu when tapping the top trigger zone
    document.getElementById('top-trigger').addEventListener('click', showHUD);

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        container.innerHTML = '';
        if (file.name.endsWith('.zip') || file.name.endsWith('.cbz')) {
            const zip = await JSZip.loadAsync(file);
            const imgs = [];
            zip.forEach((path, entry) => { if(/\.(jpe?g|png|webp|avif)$/i.test(path)) imgs.push(entry); });
            imgs.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));
            for (const img of imgs) {
                const blob = await img.async("blob");
                const el = document.createElement('img');
                el.src = URL.createObjectURL(blob); el.className = 'page';
                container.appendChild(el);
            }
        } else {
            Array.from(e.target.files).sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}))
                 .forEach(f => {
                     const el = document.createElement('img');
                     el.src = URL.createObjectURL(f); el.className = 'page';
                     container.appendChild(el);
                 });
        }
        hideHUD();
    });

    document.getElementById('accelBtn').addEventListener('click', async () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') startTilt();
        } else { startTilt(); }
    });

    function startTilt() {
        isActive = true;
        document.getElementById('accelBtn').innerText = "Tilt: ON";
        hideHUD();
        window.addEventListener('deviceorientation', (e) => {
            speed = Math.abs(e.beta - neutralZone) > 5 ? (e.beta - neutralZone) * sensitivity : 0;
        });
        requestAnimationFrame(function scroll() {
            if (isActive && speed !== 0) window.scrollBy(0, speed);
            requestAnimationFrame(scroll);
        });
    }

    // Smart Jump (Bottom 30% Tap)
    window.addEventListener('click', (e) => {
        if (e.clientY > window.innerHeight * 0.7 && !isActive) showHUD(); 
        if (e.clientY > window.innerHeight * 0.7) {
            const pages = document.querySelectorAll('.page');
            for (let p of pages) {
                if (p.getBoundingClientRect().top > 20) {
                    p.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    break;
                }
            }
        }
    });
</script>
</body>
</html>
